<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0d0b;
            --cream: #f0ebe0;
            --gold: #c9a84c;
            --muted: #5a5648;
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            padding: 60px 40px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 70px;
            animation: fadeDown 0.8s ease both;
        }

        header p {
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--cream);
        }

        header h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: fadeUp 0.9s ease both;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        .card:nth-child(2) {
            animation-delay: 0.25s;
            grid-column: 2 / 4;
            grid-row: 1 / 2;
        }

        .card:nth-child(3) {
            animation-delay: 0.4s;
            grid-column: 1 / 3;
            grid-row: 2 / 3;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.6s ease;
            filter: brightness(0.75) saturate(0.9);
            min-height: 320px;
        }

        .card:hover img {
            transform: scale(1.05);
            filter: brightness(0.5) saturate(1.1);
        }

        .card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 24px 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            transform: translateY(8px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .card:hover .card-label {
            transform: translateY(0);
            opacity: 1;
        }

        .card-label span {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px;
        }

        .card-label h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--cream);
        }

        .card-number {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            color: rgba(240, 235, 224, 0.4);
            transition: color 0.3s;
        }

        .card:hover .card-number {
            color: var(--gold);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            text-transform: uppercase;
            animation: fadeUp 1s ease 0.6s both;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 700px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .card {
                grid-column: 1 !important;
                grid-row: auto !important;
            }

            .card img {
                min-height: 240px;
            }
        }
    </style>
</head>

<body>

    <header>
        <p>Visual Collection</p>
        <h1>Through the <em>Lens</em></h1>
    </header>

    <div class="gallery">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
                alt="Mountain landscape" />
            <div class="card-number">01</div>
            <div class="card-label">
                <span>Nature</span>
                <h2>Alpine Heights</h2>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1200&q=80" alt="Sunset forest" />
            <div class="card-number">02</div>
            <div class="card-label">
                <span>Landscape</span>
                <h2>Golden Hour</h2>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80" alt="Ocean view" />
            <div class="card-number">03</div>
            <div class="card-label">
                <span>Seascape</span>
                <h2>Open Waters</h2>
            </div>
        </div>

    </div>

    <footer>Hover over each image to explore</footer>

</body>

</html>
