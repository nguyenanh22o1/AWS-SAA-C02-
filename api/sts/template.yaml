AWSTemplateFormatVersion: 2010-09-09
Description: Create a role for us to assume and create a resource to access to
# Resources section
Parameters:
  BucketName:
    Type: String
    Default: "api-sts-testing-cloudform"
Resources:
  S3Bucket:
    Type: "AWS::S3::Bucket"
    DeletionPolicy: Retain
    Properties:
      BucketName: !Ref BucketName
  StsRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - arn:aws:iam::743673022279:user/Thao
            Action:
              - "sts:AssumeRole"
      Path: /
      Policies:
        - PolicyName: s3access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource: [ !Sub "arn:aws:s3:::${BucketName}", !Sub "arn:aws:s3:::${BucketName}/*" ]
